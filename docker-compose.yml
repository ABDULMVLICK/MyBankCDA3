version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mybank_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mybank
      POSTGRES_USER: mybank
      POSTGRES_PASSWORD: mybank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mybank"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mybank_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DATABASE_URL: "sqlite:////var/www/backend/var/data_dev.db"
    volumes:
      - ./backend:/var/www/backend
      - /var/www/backend/vendor
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mybank_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
